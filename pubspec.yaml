name: pillapp
description: "Automatic pill dispenser app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  riverpod: ^2.6.1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Hardware communication (pick one based on your dispenser)
  flutter_blue_plus: ^1.35.3   # If using Bluetooth
  # mqtt_client: ^10.5.1       # If using Wi-Fi/MQTT

  # Date & time formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1       # Code generation for Hive models
  build_runner: ^2.4.13        # Required for code generation

flutter:
  uses-material-design: true